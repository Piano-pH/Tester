<!DOCTYPE html>
<html lang="en">
	<head>
		<title> The Russian Soldier </title>
		<meta charset="utf-8">
		<meta name="description" content="The Russian Soldier">
		<meta name="keywords" content="HTML, CSS, snow cone, multi-page website">
		<meta name="author" content="Keanu">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<meta http-equiv="refresh" content="100">
		<link rel="icon" type="image/png" href="images/primarylogo.png">
		<style>
			*{
				margin: 0px;
			}
			header{
				width: 100%;
				height: 100px;
				display: flex;
				background-color: #f23d67;
				color: #f0d0f0;
				position: sticky;
				top: 0px;
			}
			#texture1{
				position: sticky;
				top: 100px;
			}
			#texture2{
				position: sticky;
				top: 105px;
			}
			nav{
				width: 100%;
				height: 100px;
				display: flex;
				align-items: center;
				justify-content: center;
				text-shadow: 3px 3px #c20d37;
			}
			#navimage{
				height: 100px;
			}
			h1{
				font-family: Brush Script MT, courier;
				font-variant: small-caps;
				font-shadow: 1px 1px 2px #000000;
				margin-left: 5%;
			}
			main{
				background-color: #f0d0f0;
				width: 100%;
				height: 200vh;
			}
			footer{
				width: 100%;
				height: 100px;
				display: flex;
				background-color: #fff;
				align-items: center;
				justify-content: center;
			}
			#book,#login,#signup,#contus{
				background-color: #f23d67;
				font-family: Trebuchet MS, courier;
				font-weight: bold;
				cursor: pointer;
				transition-duration: 300ms;
				height: 100px;
				border: solid 2px #f23d67;
				color: #f0d0f0;
			}
			#book:hover,#login:hover,#signup:hover,#contus:hover{
				background-color: #505;
			}
			#navbuttons{
				width: 90%;
				display: flex;
				align-items: center;
				justify-content: center;
				height: 100px;
				font-size: 10pt;
			}
			#home{
				cursor: pointer;
			}
			#socialmedia{
				height: 95px;
			}
			#mainheader{
				width: 50%;
				font-size: 40pt;
			}
			.input{
				font-family: Trebuchet MS;
				justify-content: center;
				width: 10vw;
				height: 5vh;
				background-color: #ee0050;
				color: #f0d0f0;
				border: solid 2px #f0d0f0;
				border-radius: 20px;
				padding-left: 5px;
			}
			input::placeholder{
				color: #f0d0f0;
				padding-left: 5px;
			}
			#centerdivider{
				height: 60vh;
				margin: 10vh;
				justify-content: center;
				width: 0%;
				border: solid 3px #aa0010;
				display: flex;
			}
		</style>
	</head>
	<main>
		<header>
			<nav>
				<a href="index.html" id="home">
					<img src="images/primarylogo.png" id="navimage"></img>
				</a>
				<h1 id="mainheader">The Russian Soldier</h1>
				<section id="navbuttons">
					<a href="book.html">
						<button id="book"> Calendar </button>
					</a>
					<a href="login.html">
						<button id="login"> Login </button>
					</a>
					<a href="signup.html">
						<button id="signup"> Sign Up </button>
					</a>
					<a href="socialmedia.html">
						<button id="contus"> Contact Us </button>
					</a>
				</section>
			</nav>
		</header>
		<section style="width: 100%; height: 5px; background-color: #ee0050;" id="texture1"></section>
		<section style="width: 100%; height: 5px; background-color: #aa0010;" id="texture2"></section>
		<main>
			<center>
				<br><h1 style="font-family: Trebuchet MS, courier; text-align: center; color: #ee0010; text-shadow: 0px 1.5px 0px #aa0050;">Login to your account</h1><br><br>
				<input class="input" type="text" placeholder="E-Mail" required="required"><br>
				<input class="input" type="text" placeholder="Password" required="required"><br><br>
				<input class="input" type="submit" value="Submit" style="cursor: pointer;">
			</center>
		</main>
		<section style="width: 100%; height: 5px; background-color: #ee0050;"></section>
		<section style="width: 100%; height: 5px; background-color: #aa0010;"></section>
		<footer>
			<a href="socialmedia.html"><img src="images/socialmediaicons.png" id="socialmedia"></img></a>
		</footer>
	</main>
</html>
